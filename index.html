<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Blue's Routine">
  <title>Blue's Routine Clues!</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    /* ===== MODES ===== */
    body { font-family: 'Nunito', sans-serif; min-height: 100vh; }

    body.bedtime {
      background: radial-gradient(ellipse at 50% 30%, #1a2f5a 0%, #0a1628 100%);
    }
    body.morning {
      background: repeating-linear-gradient(
        -45deg,
        #dceeff 0px, #dceeff 20px,
        #c5deff 20px, #c5deff 40px
      );
    }

    /* Stars */
    .star {
      position: fixed; border-radius: 50%; background: white; pointer-events: none;
      animation: twinkle var(--dur, 2s) var(--del, 0s) ease-in-out infinite;
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.15; transform: scale(0.8); }
      50%      { opacity: 1;    transform: scale(1.5); }
    }

    /* ===== LAYOUT ===== */
    .app { position: relative; max-width: 420px; margin: 0 auto; padding: 24px 16px 120px; }

    /* ===== DECO (moon / sun) ===== */
    #deco {
      position: fixed; top: 14px; right: 18px; font-size: 2.7rem;
      z-index: 10; pointer-events: none;
      animation: glow 3s ease-in-out infinite;
    }
    body.morning #deco { animation: sun-rise 1s ease-out forwards, glow 2s 1s ease-in-out infinite; }
    @keyframes glow {
      0%,100% { filter: drop-shadow(0 0 8px rgba(255,215,60,.5)); }
      50%      { filter: drop-shadow(0 0 22px rgba(255,215,60,1)); }
    }
    @keyframes sun-rise {
      from { transform: translateY(-28px); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }

    /* ===== HEADER CARD ===== */
    .header-card {
      background: rgba(255,255,255,.97); border: 3px solid #d4a017;
      border-radius: 22px; padding: 14px 20px 18px;
      text-align: center; margin-bottom: 14px;
      position: relative; overflow: hidden;
    }
    .pw { position: absolute; font-size: 4rem; opacity: .06; pointer-events: none; }
    .pw.tl { top: -8px; left: -8px; transform: rotate(-20deg); }
    .pw.br { bottom: -8px; right: -8px; transform: rotate(20deg); }

    .blue-svg { width: 88px; height: 88px; margin: 0 auto 8px; display: block; }
    body.bedtime .blue-svg { animation: wiggle 2.2s ease-in-out infinite; }
    body.morning .blue-svg { animation: wiggle 1.3s ease-in-out infinite; }
    @keyframes wiggle {
      0%,100% { transform: rotate(-5deg) scale(1);    }
      50%      { transform: rotate(5deg)  scale(1.05); }
    }

    .h-title {
      font-family: 'Fredoka One', cursive; font-size: 1.85rem;
      color: #b8860b; text-shadow: 2px 2px 0 rgba(0,0,0,.07);
      margin-bottom: 6px; line-height: 1.2;
    }
    .h-sub { color: #aaa; font-size: .88rem; font-weight: 700; margin-bottom: 12px; }

    .paw-row { display: flex; justify-content: center; gap: 10px; }
    .bp { font-size: 1.3rem; animation: bp 1.4s ease-in-out infinite; }
    .bp:nth-child(2) { animation-delay: .18s; }
    .bp:nth-child(3) { animation-delay: .36s; }
    @keyframes bp { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }

    /* ===== TABS ===== */
    .tabs { display: flex; gap: 10px; margin-bottom: 14px; }
    .tab {
      flex: 1; padding: 12px 10px; border-radius: 30px; border: 2.5px solid;
      background: rgba(255,255,255,.9); font-family: 'Nunito', sans-serif;
      font-weight: 800; font-size: 1rem; cursor: pointer; transition: background .2s, color .2s;
    }
    .t-b { border-color: #d4a017; color: #c49010; }
    .t-b.on { background: #d4a017; color: white; }
    .t-m { border-color: #4a9eca; color: #4a9eca; }
    .t-m.on { background: #4a9eca; color: white; }

    /* ===== NOTEBOOK PROGRESS BAR ===== */
    .nb {
      background: white; border: 1.5px solid #c8d0e0; border-radius: 6px;
      padding: 12px 14px 12px 48px; margin-bottom: 14px; position: relative;
      background-image: repeating-linear-gradient(
        white 0px, white 27px, #bad4f0 27px, #bad4f0 28px
      );
      box-shadow: 2px 2px 6px rgba(0,0,0,.08);
    }
    .nb::before {
      content: ''; position: absolute; left: 38px; top: 0; bottom: 0;
      width: 2px; background: #ffb3c6;
    }
    .nb-label { font-weight: 700; color: #5a6a7a; font-size: .9rem; margin-bottom: 10px; position: relative; z-index: 1; }
    .nb-track  { height: 14px; background: #e4f0fb; border-radius: 10px; position: relative; overflow: visible; margin-bottom: 7px; }
    .nb-fill   {
      height: 100%; background: linear-gradient(90deg, #4a9eca, #6cb8e8);
      border-radius: 10px; width: 0%; transition: width .4s cubic-bezier(.4,0,.2,1); position: relative;
    }
    .nb-paw    { position: absolute; right: -14px; top: 50%; transform: translateY(-50%); font-size: 1.1rem; transition: opacity .3s; }
    .nb-count  { text-align: right; font-size: .82rem; color: #888; font-weight: 700; position: relative; z-index: 1; }

    /* ===== TASK ITEMS ===== */
    .task {
      background: rgba(255,255,255,.95); border: 2.5px solid #1a3a6e;
      border-radius: 16px; padding: 15px 16px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 12px; cursor: pointer;
      transition: border-color .2s, background .2s; user-select: none; position: relative;
    }
    body.bedtime .task.done { border-color: #d4a017; background: rgba(255,248,220,.9); }
    body.morning .task.done { border-color: #4a9eca; background: rgba(232,247,255,.9); }
    .t-icon  { font-size: 1.5rem; flex-shrink: 0; width: 32px; text-align: center; }
    .t-label { flex: 1; font-weight: 700; color: #5a6a7a; font-size: 1rem; }
    body.bedtime .task.done .t-label { color: #c49010; text-decoration: line-through; }
    body.morning .task.done .t-label { color: #4a9eca; text-decoration: line-through; }
    .t-circ {
      width: 30px; height: 30px; border: 3px solid #1a3a6e; border-radius: 50%;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: .9rem; color: white; transition: background .2s, border-color .2s;
    }
    body.bedtime .task.done .t-circ { background: #d4a017; border-color: #d4a017; }
    body.morning .task.done .t-circ { background: #4a9eca; border-color: #4a9eca; }

    /* ===== FLYING PAWS ===== */
    .fpaw {
      position: fixed; font-size: 1.3rem; pointer-events: none; z-index: 999;
      animation: fpaw 1.4s ease-out forwards;
    }
    @keyframes fpaw {
      0%   { transform: translateY(0)      scale(1)   rotate(0deg);  opacity: 1; }
      100% { transform: translateY(-110px) scale(.35) rotate(25deg); opacity: 0; }
    }

    /* ===== CELEBRATION ===== */
    .cel {
      display: none; position: fixed; inset: 0; z-index: 500;
      align-items: center; justify-content: center; overflow: hidden;
    }
    .cel.show { display: flex; }
    body.bedtime .cel { background: rgba(8,16,34,.93); }
    body.morning .cel { background: rgba(190,225,255,.93); }

    .cp, .cpaw {
      position: absolute; top: -24px;
      animation: cffall var(--fd) var(--fd2) linear forwards;
    }
    .cp   { border-radius: 2px; }
    .cpaw { font-size: 1.4rem; }
    @keyframes cffall {
      0%   { transform: translateY(0)     rotate(0deg);   opacity: 1;  }
      100% { transform: translateY(110vh) rotate(600deg); opacity: .2; }
    }

    .cel-card {
      background: white; border: 4px solid #d4a017; border-radius: 26px;
      padding: 24px 24px 22px; text-align: center;
      max-width: 310px; width: 88%; position: relative; z-index: 1;
      animation: pop-in .5s cubic-bezier(.175,.885,.32,1.275) both;
    }
    body.morning .cel-card { border-color: #4a9eca; }
    @keyframes pop-in {
      from { transform: scale(.35); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .cel-blue { width: 96px; height: 96px; margin: 0 auto 12px; display: block; animation: spin-in .65s cubic-bezier(.175,.885,.32,1.275) both; }
    @keyframes spin-in {
      from { transform: rotate(-360deg) scale(0); opacity: 0; }
      to   { transform: rotate(0)       scale(1); opacity: 1; }
    }
    .cel-title { font-family: 'Fredoka One', cursive; font-size: 2rem; color: #d4a017; margin-bottom: 8px; }
    body.morning .cel-title { color: #4a9eca; }
    .cel-msg  { font-weight: 700; color: #6a7a8a; font-size: .95rem; margin-bottom: 20px; line-height: 1.55; }
    .again-btn {
      background: #d4a017; color: white; border: none; border-radius: 30px;
      padding: 13px 32px; font-family: 'Nunito', sans-serif;
      font-weight: 800; font-size: 1.05rem; cursor: pointer;
    }
    body.morning .again-btn { background: #4a9eca; }
    .again-btn:active { opacity: .85; }

    /* ===== RESET BUTTON ===== */
    .reset-btn {
      display: block; width: 100%; margin-top: 16px;
      padding: 13px; background: transparent;
      border: 2px dashed rgba(150,150,150,.5); border-radius: 14px;
      color: rgba(150,150,150,.8); font-family: 'Nunito', sans-serif;
      font-weight: 700; font-size: .95rem; cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    body.bedtime .reset-btn { border-color: rgba(255,255,255,.25); color: rgba(255,255,255,.4); }
    .reset-btn:hover { border-color: rgba(150,150,150,.8); color: rgba(100,100,100,.9); }
    body.bedtime .reset-btn:hover { border-color: rgba(255,255,255,.6); color: rgba(255,255,255,.7); }
  </style>
</head>

<script>
  var R = {
    bedtime: {
      title:  "Blue's Bedtime Clues!",
      sub:    "Time to wind down with Blue 🌙",
      label:  "Blue's Bedtime Checklist 📓",
      ctitle: "Sleep tight!",
      cmsg:   "Blue found all the clues! Sweet dreams! 🌙",
      tasks:  [
        {e:"🪥", t:"Brush your teeth"},
        {e:"🚽", t:"Go pee"},
        {e:"🧺", t:"Put clothes in the laundry bin"},
        {e:"📖", t:"Read your book"}
      ]
    },
    morning: {
      title:  "Blue's Morning Clues!",
      sub:    "Rise and shine! Let's find the clues! ☀️",
      label:  "Blue's Morning Checklist 📓",
      ctitle: "Let's go! Yay!",
      cmsg:   "Blue thinks you're a superstar today! ⭐",
      tasks:  [
        {e:"🚽", t:"Go pee first!"},
        {e:"🪥", t:"Brush your teeth"},
        {e:"🥣", t:"Eat breakfast"},
        {e:"👕", t:"Put your clothes on"},
        {e:"👟", t:"Put your shoes on"},
        {e:"🚗", t:"Get in the car"}
      ]
    }
  };

  var h   = new Date().getHours();
  var tab = (h >= 5 && h < 12) ? 'morning' : 'bedtime';
  var chk = { bedtime: [false,false,false,false], morning: [false,false,false,false,false,false] };

  function resetAll() {
    var n = R[tab].tasks.length;
    chk[tab] = Array(n).fill(false);
    document.getElementById('cel').classList.remove('show');
    render();
  }

    function applyMode() {
    document.body.className = tab;
    document.getElementById('deco').textContent = tab === 'bedtime' ? '🌙' : '☀️';
    var stars = document.getElementById('stars');
    stars.innerHTML = '';
    if (tab === 'bedtime') {
      for (var i = 0; i < 65; i++) {
        var s = document.createElement('div');
        s.className = 'star';
        var sz = 1 + Math.random() * 2.5;
        s.style.cssText = 'left:' + (Math.random()*100) + 'vw;top:' + (Math.random()*100) + 'vh;' +
          'width:' + sz + 'px;height:' + sz + 'px;' +
          '--dur:' + (1.5 + Math.random()*3) + 's;--del:' + (Math.random()*4) + 's;';
        stars.appendChild(s);
      }
    }
  }

  function go(t) { tab = t; applyMode(); render(); }

  function spawnPaws(el) {
    var r = el.getBoundingClientRect();
    [0.2, 0.5, 0.8].forEach(function(x, i) {
      var p = document.createElement('span');
      p.className = 'fpaw';
      p.textContent = '🐾';
      p.style.cssText = 'left:' + (r.left + r.width*x) + 'px;top:' + (r.top + r.height/2) + 'px;' +
        'animation-delay:' + (i * 0.12) + 's';
      document.body.appendChild(p);
      setTimeout(function(){ p.remove(); }, 1600);
    });
  }

  function toggle(i, el) {
    var was = !chk[tab][i];
    chk[tab][i] = !chk[tab][i];
    if (was) spawnPaws(el);
    render();
    var done = chk[tab].filter(Boolean).length;
    if (done === R[tab].tasks.length) setTimeout(celebrate, 450);
  }

  function celebrate() {
    var r = R[tab];
    document.getElementById('ctitle').textContent = r.ctitle;
    document.getElementById('cmsg').textContent   = r.cmsg;
    var cel = document.getElementById('cel');
    cel.querySelectorAll('.cp,.cpaw').forEach(function(e){ e.remove(); });
    var colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8','#f8a5c2'];
    for (var i = 0; i < 45; i++) {
      var c = document.createElement('div');
      c.className = 'cp';
      var sz = 6 + Math.random()*10;
      c.style.cssText = 'left:' + (Math.random()*100) + '%;width:' + sz + 'px;height:' + sz + 'px;' +
        'background:' + colors[i % colors.length] + ';--fd:' + (2+Math.random()*2) + 's;--fd2:' + (Math.random()) + 's';
      cel.appendChild(c);
    }
    for (var j = 0; j < 14; j++) {
      var pw = document.createElement('div');
      pw.className = 'cpaw'; pw.textContent = '🐾';
      pw.style.cssText = 'left:' + (Math.random()*100) + '%;--fd:' + (2.5+Math.random()*2) + 's;--fd2:' + (Math.random()*1.5) + 's';
      cel.appendChild(pw);
    }
    cel.classList.add('show');
  }

  function reset() {
    var n = R[tab].tasks.length;
    chk[tab] = Array(n).fill(false);
    document.getElementById('cel').classList.remove('show');
    render();
  }

  function render() {
    var r     = R[tab];
    var c     = chk[tab];
    var done  = c.filter(Boolean).length;
    var total = r.tasks.length;

    document.getElementById('htitle').textContent  = r.title;
    document.getElementById('hsub').textContent    = r.sub;
    document.getElementById('nlabel').textContent  = r.label;
    document.getElementById('ncount').textContent  = done + ' of ' + total + ' clues found!';
    document.getElementById('nfill').style.width   = (done / total * 100) + '%';
    document.getElementById('npaw').style.opacity  = done > 0 ? '1' : '0';
    document.getElementById('tb').className = 'tab t-b' + (tab==='bedtime'?' on':'');
    document.getElementById('tm').className = 'tab t-m' + (tab==='morning'?' on':'');

    var container = document.getElementById('tasks');
    container.innerHTML = '';
    r.tasks.forEach(function(task, i) {
      var d = document.createElement('div');
      d.className = 'task' + (c[i] ? ' done' : '');
      d.innerHTML = '<span class="t-icon">' + task.e + '</span>' +
                    '<span class="t-label">' + task.t + '</span>' +
                    '<div class="t-circ">' + (c[i] ? '✓' : '') + '</div>';
      d.addEventListener('click', (function(idx, el){ return function(){ toggle(idx, el); }; })(i, d));
      container.appendChild(d);
    });
  }

  applyMode();
  render();
</script>
</body>
</html>
